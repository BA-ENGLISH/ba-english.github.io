<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Check your IP address and network information">
    <title>What is My IP?</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #333;
            font-size: 2em;
            margin-bottom: 20px;
        }

        .info-box {
            background-color: #fff;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            display: inline-block;
        }

        .info-item {
            margin: 15px 0;
        }

        .info-item span {
            font-weight: bold;
            color: #555;
        }
    </style>
</head>
<body>
    <h1>Your IP Address and Network Information</h1>
    <div class="info-box">
        <div class="info-item">IP Address: <span id="ip"></span></div>
        <div class="info-item">Location: <span id="location"></span></div>
        <div class="info-item">ISP (Network Provider): <span id="isp"></span></div>
        <div class="info-item">Timezone: <span id="timezone"></span></div>
    </div>

    <script>
        // Fetch user's IP and network info using ipinfo.io API
        fetch('https://ipinfo.io?token=62c60a3cdfe33a')  // Replace 'YOUR_API_TOKEN' with an actual API token from ipinfo.io
            .then(response => response.json())
            .then(data => {
                // Display the fetched data on the web page
                document.getElementById('ip').innerText = data.ip;
                document.getElementById('location').innerText = data.city + ', ' + data.region + ', ' + data.country;
                document.getElementById('isp').innerText = data.org;
                document.getElementById('timezone').innerText = data.timezone;
            })
            .catch(error => console.error('Error fetching IP info:', error));
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BA English Department - Contact</title>
    <!-- TailwindCSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

    <!-- Navbar -->
    <nav class="bg-blue-800 text-white p-4">
        <div class="container mx-auto flex justify-between">
            <h1 class="text-xl font-bold">BA English Department</h1>
            <ul class="flex space-x-6">
                <li><a href="index.html" class="hover:underline">Home</a></li>
                <li><a href="news.html" class="hover:underline">News & Events</a></li>
                <li><a href="gallery.html" class="hover:underline">Gallery</a></li>
                <li><a href="blog.html" class="hover:underline">Blog</a></li>
                <li><a href="contact.html" class="hover:underline">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- Contact Section -->
    <section class="py-16">
        <div class="container mx-auto">
            <h2 class="text-3xl font-bold text-center mb-8">Contact Us</h2>
            <form class="bg-white p-8 shadow-md">
                <div class="mb-4">
                    <label for="name" class="block text-gray-700">Name</label>
                    <input type="text" id="name" class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring focus:border-blue-500">
                </div>
                <div class="mb-4">
                    <label for="email" class="block text-gray-700">Email</label>
                    <input type="email" id="email" class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring focus:border-blue-500">
                </div>
                <div class="mb-4">
                    <label for="message" class="block text-gray-700">Message</label>
                    <textarea id="message" class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring focus:border-blue-500"></textarea>
                </div>
                <button type="submit" class="bg-blue-800 text-white px-4 py-2 rounded-md">Send Message</button>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-blue-800 text-white text-center p-4">
        <p>&copy; 2024 BA English Department. All Rights Reserved.</p>
    </footer>

</body>
</html>
